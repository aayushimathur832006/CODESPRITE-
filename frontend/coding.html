<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSA Lab | Professional Problem Bank</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            background: #0f0f1a; 
            color: white; 
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f0f1a; }
        ::-webkit-scrollbar-thumb { 
            background: #1e1e2e; 
            border-radius: 10px; 
            border: 2px solid #0f0f1a;
        }
        ::-webkit-scrollbar-thumb:hover { background: #2a2a3a; }

        .glass-nav {
            background: rgba(26, 26, 46, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .problem-card {
            background: #161625;
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .problem-card:hover {
            background: #1c1c2e;
            border-color: #08d9d6;
            transform: translateY(-4px);
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

    <nav class="glass-nav sticky top-0 z-50 w-full px-8 py-4 flex justify-between items-center">
        <div class="flex items-center gap-8">
            <button onclick="location.href='dashboard.html'" class="group flex items-center gap-2 text-gray-500 hover:text-[#08d9d6] transition-all">
                <span class="text-lg group-hover:-translate-x-1 transition-transform">←</span>
                <span class="text-[11px] font-extrabold uppercase tracking-[0.2em]">Dashboard</span>
            </button>
            <div class="h-6 w-[1px] bg-white/10"></div>
            <h1 class="text-xl font-extrabold tracking-tight text-white">DSA <span class="text-[#08d9d6]">Lab</span></h1>
        </div>

        
    </nav>

    <main class="flex-1 overflow-y-auto px-8 py-10">
        <div class="max-w-[1600px] mx-auto">
            <header class="mb-12">
                <p class="text-[#08d9d6] text-[10px] font-black uppercase tracking-[0.3em] mb-2">Curated Question Bank</p>
                <h2 class="text-4xl font-extrabold tracking-tighter">Explore 200+ Problems</h2>
            </header>

            <div id="questionsContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
        
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
