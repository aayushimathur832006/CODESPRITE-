<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Interviewer | Professional Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            background: #08080e; 
            color: white; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
        }
        .glass-panel {
            background: rgba(20, 20, 35, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.03);
        }
        /* Circular Avatar Container to match image_765dd5.png */
        .avatar-circle-wrapper {
            position: relative;
            width: 280px;
            height: 280px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: visible;
        }
        .avatar-img {
            width: 240px;
            height: 240px;
            object-fit: cover;
            border-radius: 50%;
            transition: all 0.4s ease;
        }
        /* Pulsing effect when AI talks */
        .speaking-active .avatar-img {
            filter: drop-shadow(0 0 30px #8b5cf6);
            transform: scale(1.05);
            border: 2px solid #8b5cf6;
        }
        .status-dot {
            position: absolute;
            bottom: 30px;
            right: 30px;
            width: 14px;
            height: 14px;
            background: #10b981;
            border-radius: 50%;
            border: 3px solid #08080e;
            box-shadow: 0 0 10px #10b981;
        }
        
    </style>
</head>
<body class="h-screen flex items-center justify-center p-6">

    <!-- Dashboard Link -->
    <button onclick="location.href='dashboard.html'" class="absolute top-8 left-8 text-gray-500 hover:text-white text-[10px] font-black uppercase tracking-[0.2em] transition z-50">
        ← Exit Session
    </button>

    <div class="max-w-6xl w-full flex flex-col md:flex-row gap-6 items-stretch">
        
        <!-- Left Pane: AI Avatar Presence (Matches image_765dd5.png) -->
        <div class="flex-1 glass-panel rounded-[3.5rem] p-12 flex flex-col items-center justify-center text-center">
            <div id="aiContainer" class="avatar-circle-wrapper mb-10">
                <img id="aiAvatar" src="https://t3.ftcdn.net/jpg/06/33/36/82/360_F_633368225_LwDAmhPhhsEwCLN8JT1cADEne6r848sr.jpg" class="avatar-img" alt="AI Interviewer">
                <div class="status-dot animate-pulse"></div>
            </div>
            <div>
                <h3 class="text-3xl font-extrabold tracking-tight">AI Technical Interview <span class="text-[#8b5cf6]">v2.0</span></h3>
                <p class="text-gray-500 text-[11px] font-bold uppercase tracking-[0.2em] mt-3">Active Session: Technical Rounds</p>
            </div>
        </div>

        <!-- Right Pane: Conversation Interface -->
        <div class="flex-1 flex flex-col gap-6">
            
            <!-- Question Box -->
            <div class="glass-panel rounded-[2.5rem] p-10 flex-1 flex flex-col justify-center">
                <p class="text-[#8b5cf6] text-[10px] font-black uppercase tracking-[0.3em] mb-4">Interviewer's Question</p>
                <h2 id="questionText" class="text-2xl font-semibold leading-relaxed text-gray-100 italic">
                    "Click the button below to initialize the AI interviewer."
                </h2>
            </div>

            <!-- Interaction Controls -->
            <div class="glass-panel rounded-[2.5rem] p-8">
                <div id="transcriptBox" class="min-h-[50px] mb-6 flex items-center">
                    <span id="transcript" class="text-[#08d9d6] text-sm italic font-medium opacity-80"></span>
                </div>

                <div class="flex gap-4">
                    <button id="startBtn" onclick="generateDynamicQuestions()" class="w-full py-5 bg-[#8b5cf6] text-white font-black rounded-2xl uppercase tracking-widest hover:brightness-110 transition shadow-xl shadow-purple-500/20">
                        Start Session
                    </button>
                    
                    <button id="micBtn" onclick="startListening()" class="hidden w-full py-5 bg-[#08d9d6] text-black font-black rounded-2xl uppercase tracking-widest transition flex items-center justify-center gap-4">
                        <span id="micText">🎤 Click to Respond</span>
                    </button>
                </div>
            </div>

        </div>
    </div>

    <script>
    let questions = [];
    let currentQuestionIndex = 0;

    const aiContainer = document.getElementById('aiContainer');
    const questionText = document.getElementById('questionText');
    const transcriptDisplay = document.getElementById('transcript');
    const startBtn = document.getElementById('startBtn');
    const micBtn = document.getElementById('micBtn');

    async function generateDynamicQuestions() {

        startBtn.innerText = "Initializing AI Interview Engine...";
        startBtn.disabled = true;

        try {

            const response = await fetch("https://alfa-leetcode-api.onrender.com/problems?limit=150");
            const data = await response.json();

            const shuffled = data.problemsetQuestionList
                .sort(() => 0.5 - Math.random())
                .slice(0, 4);

            questions = shuffled.map((prob) => {

                const templates = [

`You are given the problem "${prob.title}". 
First explain the brute force solution, then optimize it. 
What data structure would you use and why? 
Also explain the time and space complexity.`,

`Consider the LeetCode problem "${prob.title}". 
Walk me through your intuition step by step. 
How would you identify the optimal approach during an interview?`,

`For the problem "${prob.title}", 
what would be the most optimal algorithm? 
Can you compare it against the naive approach and explain the tradeoffs?`,

`Suppose you are solving "${prob.title}" in a real technical interview. 
Explain:
1. Brute force solution
2. Better solution
3. Optimal solution
4. Time complexity
5. Space complexity
6. Edge cases to consider.`,

`In the problem "${prob.title}", 
how would you decide whether to use:
- HashMap
- Stack
- Queue
- Sliding Window
- Two Pointers
- Binary Search
Explain your reasoning clearly.`,

`Explain how you would optimize the problem "${prob.title}" 
if the input size becomes extremely large. 
What bottlenecks would appear in the brute force solution?`

                ];

                return templates[Math.floor(Math.random() * templates.length)];

            });

            questions.push(
                "Excellent work. Your technical interview session has been completed successfully."
            );

            startInterview();

        } catch (error) {

            questions = [

                "Explain the difference between brute force and optimal solutions with an example.",

                "How do you analyze time complexity and space complexity in DSA problems?",

                "When would you choose Sliding Window over Two Pointers?",

                "Explain how HashMaps improve time complexity in interview problems.",

                "Interview session completed successfully."

            ];

            startInterview();
        }
    }

    function speak(text, callback) {

        const synth = window.speechSynthesis;

        const utterance = new SpeechSynthesisUtterance(text);

        utterance.rate = 0.95;

        utterance.onstart = () => {
            aiContainer.classList.add('speaking-active');
        };

        utterance.onend = () => {

            aiContainer.classList.remove('speaking-active');

            if (callback) callback();
        };

        synth.speak(utterance);
    }

    const SpeechRecognition =
        window.SpeechRecognition || window.webkitSpeechRecognition;

    const recognition = SpeechRecognition
        ? new SpeechRecognition()
        : null;

    if (recognition) {

        recognition.continuous = false;
        recognition.interimResults = false;

        recognition.onresult = (event) => {

            const transcript = event.results[0][0].transcript;

            transcriptDisplay.innerText = transcript;
        };

        recognition.onend = () => {

            micBtn.classList.replace("bg-red-500", "bg-[#08d9d6]");

            document.getElementById('micText').innerText =
                "🎤 Click to Respond";

            setTimeout(() => {

                currentQuestionIndex++;

                if (currentQuestionIndex < questions.length) {
                    askQuestion();
                } else {
                    finishSession();
                }

            }, 1500);
        };
    }

    function startInterview() {

        startBtn.classList.add('hidden');

        micBtn.classList.remove('hidden');

        askQuestion();
    }

    function askQuestion() {

        transcriptDisplay.innerText = "";

        const q = questions[currentQuestionIndex];

        questionText.innerText = `"${q}"`;

        micBtn.disabled = true;

        document.getElementById('micText').innerText =
            "🤖 AI Generating Question...";

        micBtn.classList.add('opacity-40');

        speak(q, () => {

            micBtn.disabled = false;

            micBtn.classList.remove('opacity-40');

            document.getElementById('micText').innerText =
                "🎤 Click to Respond";
        });
    }

    function startListening() {

        if (!recognition) {
            return alert("Please use Chrome for voice support.");
        }

        transcriptDisplay.innerText = "Listening to your response...";

        document.getElementById('micText').innerText =
            "🔴 RECORDING...";

        micBtn.classList.replace("bg-[#08d9d6]", "bg-red-500");

        recognition.start();
    }

    function finishSession() {

        questionText.innerText =
            "Interview Complete. Redirecting to dashboard...";

        setTimeout(() => {
            window.location.href = 'dashboard.html';
        }, 3000);
    }
</script>
</body>
</html>
