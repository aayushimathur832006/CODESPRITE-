

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ATS Resume Analyzer | CODESPRITE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            background: #0d0d17; 
            color: white; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .analyzer-container {
            position: relative;
            padding: 1.5px;
            border-radius: 40px;
            background: linear-gradient(135deg, #ff2e63 0%, #08d9d6 100%);
            width: 90%;
            max-width: 850px;
        }

        .inner-card {
            background: #11111f;
            border-radius: 38px;
            padding: 2.5rem;
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            gap: 2.5rem;
        }

        .progress-ring__circle {
            transition: stroke-dashoffset 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }

        .skill-pill {
            font-size: 9px;
            font-weight: 800;
            padding: 6px 12px;
            border-radius: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .found-pill { color: #08d9d6; border: 1px solid rgba(8, 217, 214, 0.2); background: rgba(8, 217, 214, 0.05); }
        .missing-pill { color: #ff2e63; border: 1px solid rgba(255, 46, 99, 0.2); background: rgba(255, 46, 99, 0.05); }

        @media (max-width: 768px) {
            .inner-card { grid-template-columns: 1fr; padding: 1.5rem; }
        }
    </style>
</head>
<body class="p-4">

    <button onclick="location.href='dashboard.html'" class="absolute top-6 left-8 text-gray-500 hover:text-white text-[9px] font-black uppercase tracking-[0.3em] transition">
        ← DASHBOARD
    </button>

    <div class="analyzer-container">
        <div class="inner-card shadow-2xl">
            
            <!-- Left Side: Upload & Info -->
            <div class="flex flex-col justify-center">
                <div class="flex items-center gap-3 mb-4">
                    <div class="bg-red-500/20 p-2 rounded-xl">
                        <svg class="w-5 h-5 text-red-500" fill="currentColor" viewBox="0 0 20 20"><path d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4z"></path></svg>
                    </div>
                    <span class="text-[9px] font-black tracking-widest text-red-500 border border-red-500/20 px-3 py-1 rounded-full uppercase">Industry Standard v2.1</span>
                </div>

                <h1 class="text-3xl font-extrabold mb-2 tracking-tight">Resume <span class="text-[#08d9d6]">Analyzer</span></h1>
                <p class="text-gray-400 text-xs mb-8 leading-relaxed">Scanning for <b>Hard Skills</b>, <b>Measurable Impact</b>, and <b>ATS-Friendly Formatting</b>.</p>

                <div id="dropZone" onclick="document.getElementById('resumeUpload').click()" class="border border-dashed border-white/10 rounded-[1.5rem] p-8 flex flex-col items-center justify-center cursor-pointer hover:border-[#08d9d6]/40 hover:bg-white/5 transition-all mb-6 group">
                    <div class="text-2xl text-gray-600 mb-2 group-hover:text-[#08d9d6] transition">+</div>
                    <p id="fileName" class="text-[9px] font-black text-[#08d9d6] uppercase tracking-[0.2em]">Upload PDF Resume</p>
                    <input type="file" id="resumeUpload" accept=".pdf" class="hidden" onchange="updateFileName()">
                </div>

                <!-- FIXED: Changed function to analyzeResume() and added id="analyzeBtn" -->
                <button id="analyzeBtn" onclick="analyzeResume()" class="w-full py-4 bg-[#ff2e63] text-white font-black rounded-xl uppercase tracking-[0.15em] hover:shadow-[0_0_20px_rgba(255,46,99,0.4)] active:scale-95 transition-all text-xs disabled:opacity-50">
                    Run Smart Scan
                </button>
            </div>

            <!-- Right Side: Official Metrics -->
            <!-- FIXED: Added id="resultSection" and opacity transition -->
            <div id="resultSection" class="flex flex-col items-center opacity-40 transition-opacity duration-500">
                
                <!-- Gauge -->
                <div class="relative flex items-center justify-center mb-8">
                    <svg class="w-40 h-40">
                        <circle class="text-white/5" stroke-width="10" stroke="currentColor" fill="transparent" r="65" cx="80" cy="80"/>
                        <circle id="progressCircle" class="text-[#08d9d6] progress-ring__circle" stroke-width="10" stroke-dasharray="408.4" stroke-dashoffset="408.4" stroke-linecap="round" stroke="currentColor" fill="transparent" r="65" cx="80" cy="80"/>
                    </svg>
                    <div class="absolute text-center">
                        <span id="scoreValue" class="text-4xl font-black italic tracking-tighter">0</span>
                        <p class="text-[8px] font-bold text-gray-500 uppercase tracking-widest">ATS Match</p>
                    </div>
                </div>

                <!-- Analysis breakdown container -->
                <div id="skillsList" class="w-full space-y-4">
                    <!-- Hard Skills Found -->
                    <div class="bg-white/5 rounded-2xl p-4 border border-white/5">
                        <p class="text-[8px] font-black text-[#08d9d6] uppercase tracking-[0.2em] mb-3 flex justify-between">
                            <span>Detected Hard Skills</span>
                            <span class="text-gray-500">Industry Matched</span>
                        </p>
                        <div id="foundSkills" class="flex flex-wrap gap-2">
                            <span class="text-[8px] text-gray-600 font-bold uppercase tracking-widest italic">Awaiting data...</span>
                        </div>
                    </div>

                    <!-- Critical Missing Keywords -->
                    <div class="bg-white/5 rounded-2xl p-4 border border-white/5">
                        <p class="text-[8px] font-black text-[#ff2e63] uppercase tracking-[0.2em] mb-3 flex justify-between">
                            <span>Missing Keywords</span>
                            <span class="text-gray-500 italic">Critical Fix</span>
                        </p>
                        <div id="missingSkills" class="flex flex-wrap gap-2">
                            <span class="text-[8px] text-gray-600 font-bold uppercase tracking-widest italic">Awaiting data...</span>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Integrate your script.js logic directly or link your external script.js file -->
    <script>

    function updateFileName() {

        const input = document.getElementById('resumeUpload');
        const fileName = document.getElementById('fileName');

        if (input.files.length > 0) {
            fileName.innerText = input.files[0].name;
            fileName.classList.add('text-white');
        }
    }

    async function analyzeResume() {

        const fileInput = document.getElementById('resumeUpload');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const resultSection = document.getElementById('resultSection');

        const scoreText = document.getElementById('scoreValue');
        const circle = document.getElementById('progressCircle');

        if (!fileInput.files[0]) {
            alert("Please upload a PDF first.");
            return;
        }

        analyzeBtn.innerText = "Analyzing...";
        analyzeBtn.disabled = true;

        const formData = new FormData();
        formData.append("resume", fileInput.files[0]);

        try {

            const res = await fetch("http://127.0.0.1:5000/api/analyze-resume", {
                method: "POST",
                body: formData
            });

            const data = await res.json();

            console.log(data);

            if (data.error) {
                throw new Error(data.error);
            }

            // Make result section visible
            resultSection.classList.remove('opacity-40');
            resultSection.classList.add('opacity-100');

            // Animate score
            const targetScore = data.score;

            const radius = 65;
            const circumference = 2 * Math.PI * radius;

            circle.style.strokeDashoffset =
                circumference - (targetScore / 100) * circumference;

            let current = 0;

            const interval = setInterval(() => {

                if (current >= targetScore) {
                    clearInterval(interval);
                }

                scoreText.innerText = current;
                current++;

            }, 15);

            // Found Skills
            document.getElementById('foundSkills').innerHTML =

                data.skills.length > 0

                ? data.skills.map(skill => `
                    <span class="skill-pill found-pill">
                        ${skill}
                    </span>
                `).join('')

                : `
                    <span class="text-[8px] text-gray-500 font-bold uppercase italic">
                        No Skills Found
                    </span>
                `;

            // Missing Skills
            document.getElementById('missingSkills').innerHTML =

                data.missing.length > 0

                ? data.missing.map(skill => `
                    <span class="skill-pill missing-pill">
                        ${skill}
                    </span>
                `).join('')

                : `
                    <span class="text-[8px] text-gray-500 font-bold uppercase italic">
                        Perfect Resume
                    </span>
                `;

        }

        catch (err) {

            console.error(err);

            alert("Error: " + err.message);

        }

        finally {

            analyzeBtn.innerText = "Run Smart Scan";
            analyzeBtn.disabled = false;
        }
    }

</script>
</body>
</html>
